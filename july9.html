<!DOCTYPE html>
<html>
<head>
    <title>Form Page</title>
        <style>
            body{
                background-color:#f5f7fa;
            }

            h1{
                background-color:#2c3e50;
                color:white;
                padding:15px;
                border-radius:8px;
            }

            table{
                background-color:white;
                border:2px solid #2c3e50;
                border-collapse:collapse;
            }

            td{
                border:1px solid lightgray;
                padding:12px;
            }

            button{
                background-color:#2c3e50;
                color:white;
                padding:8px 20px;
                border:none;
                border-radius:5px;
            }

            button:hover{
                background-color:#1b2838;
            }




    </style>
</head>

<body>

<div align="center">

    <h1>Company Level Task</h1>
    <hr>
    <br> <br>
    <form action="#no_action" method="post">

        <table border="1" cellpadding="12" cellspacing="0" >

            <tr>
                <td width="150"><b>Name</b></td>
                <td>
                    <input type="text" placeholder="Enter your name">
                </td>
            </tr>

            <tr>
                <td><b>DOB</b></td>
                <td>
                    <input type="date" name="dob" required>
                </td>
            </tr>

            <tr>
                <td><b>Gender</b></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                    <input type="radio" name="gender"> Other
                </td>
            </tr>

            <tr>
                <td valign="top"><b>Technologies</b></td>
                <td>
                    <input type="checkbox"> Python <br>
                    <input type="checkbox"> Java <br>
                    <input type="checkbox"> HTML <br>
                    <input type="checkbox"> CSS <br>
                    <input type="checkbox"> Data Analytics
                </td>
            </tr>

            <tr>
                <td><b>Country</b></td>
                <td>
                    <select name="Country">
                        <option>Select a Country</option>
                        <option>India</option>
                        <option>USA</option>
                        <option>Canada</option>
                        <option>Germany</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td valign="top"><b>Address</b></td>
                <td>
                    <textarea rows="5" cols="35" placeholder="Enter your address"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit"><b>Save</b></button>
                </td>
            </tr>

        </table>

    </form>

</div>

</body>
</html>
